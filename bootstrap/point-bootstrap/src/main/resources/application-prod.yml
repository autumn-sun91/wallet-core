spring:
  application:
    name: point-service

  # ─── DataSource ───────────────────────────────────
  datasource:
    master:
      jdbc-url: jdbc:mysql://${DB_MASTER_HOST:mysql-master}:${DB_PORT:3306}/${DB_NAME:point_db}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      username: ${DB_USER:root}
      password: ${DB_PASS:root1234}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        pool-name: point-master-pool
        maximum-pool-size: 20
        minimum-idle: 5
        connection-timeout: 10000
        idle-timeout: 30000
        max-lifetime: 1800000
        keepalive-time: 60000
        auto-commit: false
    slave:
      slave-1:
        jdbc-url: jdbc:mysql://${DB_SLAVE_1_HOST:mysql-slave-1}:3306/${DB_NAME:point_db}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
        username: ${DB_USER:root}
        password: ${DB_PASS:root1234}
        driver-class-name: com.mysql.cj.jdbc.Driver
        hikari:
          pool-name: point-slave-1-pool
          maximum-pool-size: 10
          minimum-idle: 3
          auto-commit: false
      slave-2:
        jdbc-url: jdbc:mysql://${DB_SLAVE_2_HOST:mysql-slave-2}:3306/${DB_NAME:point_db}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
        username: ${DB_USER:root}
        password: ${DB_PASS:root1234}
        driver-class-name: com.mysql.cj.jdbc.Driver
        hikari:
          pool-name: point-slave-2-pool
          maximum-pool-size: 10
          minimum-idle: 3
          auto-commit: false
      slave-3:
        jdbc-url: jdbc:mysql://${DB_SLAVE_3_HOST:mysql-slave-3}:3306/${DB_NAME:point_db}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
        username: ${DB_USER:root}
        password: ${DB_PASS:root1234}
        driver-class-name: com.mysql.cj.jdbc.Driver
        hikari:
          pool-name: point-slave-3-pool
          maximum-pool-size: 10
          minimum-idle: 3
          auto-commit: false

  # ─── JPA ──────────────────────────────────────────
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: validate              # DDL 은 직접 관리
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100 # N+1 방지
        jdbc:
          batch_size: 50              # 벌크 INSERT 성능
          order_inserts: true
          order_updates: true
        connection:
          provider_disables_autocommit: true

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: "*"