spring:
  application:
    name: point-consumer
  kafka:
    bootstrap-servers: localhost:9094   # KRaft 외부 포트
    consumer:
      group-id: point-consumer-group

  datasource:
    url: jdbc:h2:mem:point_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    hibernate:
      ddl-auto: create-drop

kafka:
  topic:
    point-grant: point.grant

management:
  endpoints:
    web:
      exposure:
        include: "*"