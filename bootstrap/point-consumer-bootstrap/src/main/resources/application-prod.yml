spring:
  application:
    name: point-consumer

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9094}
    consumer:
      group-id: point-consumer-group

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:point_db}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USER:root}
    password: ${DB_PASS:root1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: point-consumer-hikari
      maximum-pool-size: 10
      minimum-idle: 3

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

kafka:
  topic:
    point-grant: point.grant

server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful