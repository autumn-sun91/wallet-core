worker_processes auto;  # CPU 코어 수 자동 감지
worker_rlimit_nofile 65535;

events {
    worker_connections 1024;  # worker 당 커넥션 수
    use epoll;                # Linux epoll 사용
    multi_accept on;          # 한번에 여러 커넥션 수락
}

http {
    upstream point-service {
        least_conn;
        server point-service:8080;
        keepalive 1024;           # upstream 커넥션 재사용 개수
        keepalive_timeout 60s;   # upstream 커넥션 유지 시간
        keepalive_requests 1000; # 커넥션당 최대 요청 수
    }

    server {
        listen 80;

        location / {
            proxy_pass http://point-service;
            proxy_http_version 1.1;          # keepalive 는 HTTP/1.1 필수
            proxy_set_header Connection "";  # keepalive 유지를 위해 비워야 함
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}